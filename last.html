<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Gift 🎁</title>

<style>

body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  color: white;
  overflow: hidden;
}


h1 {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  margin: 0;
  font-size: 2.5rem;
  text-align: center;
  animation: fadeIn 2s ease;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
}


.center-area {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}


.gift-container {
  cursor: pointer;
}


.gift-box {
  position: relative;
  width: 200px;
  height: 160px;
  animation: shake 1.4s infinite ease-in-out;
}


.box {
  width: 100%;
  height: 100%;
  background: #ff6a6a;
  border-radius: 14px;
  position: absolute;
}

.box::before {
  content: "";
  position: absolute;
  width: 24px;
  height: 100%;
  background: white;
  left: 50%;
  transform: translateX(-50%);
}


.lid {
  position: absolute;
  top: -35px;
  width: 200px;
  height: 60px;
  background: #ff4d4d;
  border-radius: 14px 14px 0 0;
  transition: 0.6s ease;
}


.lid::before {
  content: "";
  position: absolute;
  width: 24px;
  height: 100%;
  background: white;
  left: 50%;
  transform: translateX(-50%);
}


.lid::after {
  content: "";
  position: absolute;
  top: -18px;
  left: 50%;
  width: 34px;
  height: 34px;
  background: white;
  transform: translateX(-50%) rotate(45deg);
  border-radius: 6px;
}


@keyframes shake {
  0%   { transform: rotate(0deg) translateX(0); }
  25%  { transform: rotate(2deg) translateX(2px); }
  50%  { transform: rotate(-2deg) translateX(-2px); }
  75%  { transform: rotate(2deg) translateX(2px); }
  100% { transform: rotate(0deg) translateX(0); }
}


.open .lid {
  transform: translateY(-110px) rotate(-15deg);
}

.open .box {
  box-shadow: 0 0 30px rgba(255,255,255,0.7);
}


.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

.popup.active {
  opacity: 1;
  pointer-events: all;
}

.popup-content {
  background: #fff;
  color: #000;
  padding: 30px 40px;
  border-radius: 12px;
  text-align: center;
  animation: popupIn 0.5s ease;
}

@keyframes popupIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}


.code-box {
  margin-top: 20px;
  padding: 10px 15px;
  background: #f5f5f5;
  border-radius: 8px;

  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.code-box span {
  font-weight: bold;
  color: #333;
}

.code-box button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  background: #0f3460;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.code-box button:hover {
  background: #16213e;
}


.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: 0;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}


@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; }
}

</style>
</head>

<body>

<h1>Now it's time for your gift 🎁</h1>

<div class="center-area">
  <div class="gift-container" onclick="openGift()">
    <div class="gift-box">
      <div class="lid"></div>
      <div class="box"></div>
    </div>
  </div>
</div>


<div class="popup" id="popup">
  <div class="popup-content">
    <h2>💙 Surprise 💙</h2>
    <p>You mean more to me than words can ever say ✨</p>

    <div class="code-box">
      <span id="giftCode">PEXU-QV67H8-QBAX</span>
      <button onclick="copyCode()">Copy</button>
    </div>

  </div>
</div>

<script>

function openGift() {
  document.querySelector(".gift-container").classList.add("open");

  setTimeout(() => {
    document.getElementById("popup").classList.add("active");
    launchConfetti();
  }, 500);
}


function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    let c = document.createElement("div");
    c.className = "confetti";

    c.style.left = Math.random() * 100 + "vw";
    c.style.backgroundColor =
      ["#ff4d4d", "#ffd700", "#00ffcc", "#ffffff"][Math.floor(Math.random()*4)];

    c.style.animationDuration = (2 + Math.random() * 3) + "s";

    document.body.appendChild(c);

    setTimeout(() => c.remove(), 5000);
  }
}

function copyCode() {
  const code = document.getElementById("giftCode").innerText;
  navigator.clipboard.writeText(code);

  const btn = document.querySelector(".code-box button");
  btn.innerText = "Copied!";

  setTimeout(() => {
    btn.innerText = "Copy";
  }, 2000);
}

</script>

</body>
</html>
